<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS 訂閱案例庫 — 工作流 / 賺錢專案雷達</title>
<style>
  :root{
    --bg:#0f1115; --card:#181b22; --card-hover:#1f2330;
    --text:#e8eaf0; --muted:#8b91a3; --line:#2a2f3d;
    --accent:#5eead4; --accent2:#fbbf24; --pill:#232838;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:"Segoe UI","Microsoft JhengHei",system-ui,sans-serif;line-height:1.6}
  .wrap{max-width:1100px;margin:0 auto;padding:32px 20px 80px}
  header h1{font-size:1.6rem;letter-spacing:.5px}
  header h1 span{color:var(--accent)}
  header p{color:var(--muted);margin-top:6px;font-size:.92rem}
  .meta{color:var(--muted);font-size:.8rem;margin-top:4px}

  .controls{margin:22px 0 10px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  #search{flex:1;min-width:220px;background:var(--card);border:1px solid var(--line);color:var(--text);
    padding:9px 14px;border-radius:8px;font-size:.95rem;outline:none}
  #search:focus{border-color:var(--accent)}
  select{background:var(--card);border:1px solid var(--line);color:var(--text);padding:9px 10px;border-radius:8px;font-size:.9rem}

  .pills{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 4px}
  .pill{background:var(--pill);border:1px solid var(--line);color:var(--muted);padding:5px 14px;
    border-radius:999px;font-size:.85rem;cursor:pointer;user-select:none;transition:.15s}
  .pill:hover{color:var(--text)}
  .pill.active{background:var(--accent);color:#0f1115;border-color:var(--accent);font-weight:600}
  .count{color:var(--muted);font-size:.85rem;margin:8px 2px 14px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;
    display:flex;flex-direction:column;gap:10px;transition:.15s}
  .card:hover{background:var(--card-hover);border-color:#3a4156;transform:translateY(-2px)}
  .card .top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
  .cat{font-size:.72rem;padding:3px 10px;border-radius:999px;background:var(--pill);color:var(--accent);white-space:nowrap}
  .src{font-size:.72rem;color:var(--muted);white-space:nowrap}
  .card h3{font-size:1.02rem;line-height:1.45}
  .card h3 a{color:var(--text);text-decoration:none}
  .card h3 a:hover{color:var(--accent)}
  .mrr{display:inline-block;font-size:.8rem;color:#0f1115;background:var(--accent2);
    padding:2px 10px;border-radius:6px;font-weight:700;align-self:flex-start}
  .summary{color:var(--muted);font-size:.87rem;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .foot{margin-top:auto;display:flex;justify-content:space-between;color:var(--muted);font-size:.78rem;border-top:1px solid var(--line);padding-top:10px}
  .empty{color:var(--muted);text-align:center;padding:60px 0;grid-column:1/-1}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>SaaS 訂閱案例庫 <span>// 工作流・賺錢專案雷達</span></h1>
    <p>自動抓取 Hacker News + Reddit 上「有營收數字、訂閱型態、工作流自動化」的真實 SaaS 案例。看別人怎麼賺，拆解他的模式。</p>
    <div class="meta" id="updated"></div>
  </header>

  <div class="controls">
    <input id="search" type="text" placeholder="搜尋：n8n、MRR、automation、API…">
    <select id="sort">
      <option value="score">熱度排序</option>
      <option value="date">最新優先</option>
      <option value="mrr">有營收數字優先</option>
    </select>
  </div>
  <div class="pills" id="catPills"></div>
  <div class="pills" id="srcPills"></div>
  <div class="count" id="count"></div>

  <div class="grid" id="grid"></div>
</div>

<script src="cases.js"></script>
<script>
const grid=document.getElementById('grid');
const state={cat:'全部',src:'全部',q:'',sort:'score'};

const cats=['全部',...new Set(CASES.map(c=>c.category))];
const srcs=['全部',...new Set(CASES.map(c=>c.source))];

function pills(el,items,key){
  el.innerHTML=items.map(i=>`<div class="pill${state[key]===i?' active':''}" data-v="${i}">${i}</div>`).join('');
  el.querySelectorAll('.pill').forEach(p=>p.onclick=()=>{state[key]=p.dataset.v;render();});
}

function render(){
  pills(document.getElementById('catPills'),cats,'cat');
  pills(document.getElementById('srcPills'),srcs,'src');
  let list=CASES.filter(c=>
    (state.cat==='全部'||c.category===state.cat)&&
    (state.src==='全部'||c.source===state.src)&&
    (state.q===''||(c.title+' '+c.summary+' '+(c.tags||[]).join(' ')).toLowerCase().includes(state.q))
  );
  if(state.sort==='score')list.sort((a,b)=>b.points-a.points);
  if(state.sort==='date')list.sort((a,b)=>b.date.localeCompare(a.date));
  if(state.sort==='mrr')list.sort((a,b)=>(b.mrr?1:0)-(a.mrr?1:0)||b.points-a.points);
  document.getElementById('count').textContent=`${list.length} 個案例`;
  grid.innerHTML=list.length?list.map(c=>`
    <div class="card">
      <div class="top"><span class="cat">${c.category}</span><span class="src">${c.source} · ${c.date}</span></div>
      <h3><a href="${c.url}" target="_blank" rel="noopener">${c.title}</a></h3>
      ${c.mrr?`<span class="mrr">💰 ${c.mrr}</span>`:''}
      <div class="summary">${c.summary||''}</div>
      <div class="foot"><span>${c.points>0?'▲ '+c.points+' 熱度':'本週熱門'}</span><span>${c.comments>0?'💬 '+c.comments+' 留言':''}</span></div>
    </div>`).join('')
    :'<div class="empty">沒有符合的案例</div>';
}

document.getElementById('search').oninput=e=>{state.q=e.target.value.toLowerCase();render();};
document.getElementById('sort').onchange=e=>{state.sort=e.target.value;render();};
document.getElementById('updated').textContent='最後更新：'+(typeof UPDATED!=='undefined'?UPDATED:'—')+'（fetch_saas_cases.py 自動產生）';
render();
</script>
</body>
</html>
